<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VacationAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 60px;
            color: #ffffff;
            letter-spacing: -1px;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
        }

        .search-box {
            position: relative;
            background: linear-gradient(135deg, #FF006E, #8338EC, #3A86FF);
            padding: 2px;
            border-radius: 50px;
        }

        .search-inner {
            background: #121212;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 0 25px;
        }

        input {
            flex: 1;
            padding: 22px 10px;
            font-size: 16px;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
        }

        input::placeholder {
            color: #666;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .search-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .search-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .search-icon {
            width: 24px;
            height: 24px;
        }

        .search-icon svg {
            width: 100%;
            height: 100%;
        }

        #resultado {
            display: none;
            width: 100%;
            max-width: 900px;
            margin-top: 60px;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #121212;
            border-radius: 24px;
            padding: 40px;
            position: relative;
            background-clip: padding-box;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, #FF006E, #8338EC, #3A86FF);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .card h2 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #FF006E, #8338EC, #3A86FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .resposta-ia {
            white-space: pre-wrap;
            line-height: 2;
            font-size: 16px;
            color: #e0e0e0;
            font-weight: 400;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
            font-weight: 500;
            background: linear-gradient(135deg, #FF006E, #8338EC, #3A86FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .erro {
            border: 2px solid #FF006E !important;
        }

        .erro h2 {
            color: #FF006E !important;
            -webkit-text-fill-color: #FF006E !important;
        }

        @media (max-width: 768px) {
            .header {
                top: 20px;
                right: 20px;
                font-size: 18px;
            }
            .hero h1 {
                font-size: 2rem;
                margin-bottom: 40px;
            }
            .card {
                padding: 25px;
            }
            .card h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">VacationAI</div>
    
    <div class="container">
        <div class="hero">
            <h1>Para onde você deseja ir?</h1>
            
            <div class="search-wrapper">
                <div class="search-box">
                    <div class="search-inner">
                        <input 
                            type="text" 
                            id="pergunta" 
                            placeholder="Digite sua viagem dos sonhos..."
                            onkeypress="if(event.key === 'Enter') buscar()"
                        >
                        <button class="search-btn" id="btnBuscar" onclick="buscar()">
                            <div class="search-icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <defs>
                                        <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
                                            <stop offset="50%" style="stop-color:#8338EC;stop-opacity:1" />
                                            <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:1" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M21 21L16.65 16.65M19 11C19 15.4183 15.4183 19 11 19C6.58172 19 3 15.4183 3 11C3 6.58172 6.58172 3 11 3C15.4183 3 19 6.58172 19 11Z" stroke="url(#icon-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultado"></div>
    </div>

    <script>
        async function buscar() {
            const pergunta = document.getElementById('pergunta').value.trim();
            const btn = document.getElementById('btnBuscar');
            const resultado = document.getElementById('resultado');
            
            if (!pergunta) return;

            btn.disabled = true;
            resultado.style.display = 'block';
            resultado.innerHTML = '<div class="loading">✨ Criando seu roteiro perfeito...</div>';

            try {
                const res = await fetch('/api/roteiro', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: pergunta})
                });

                if (!res.ok) {
                    const erro = await res.json();
                    throw new Error(erro.detail || 'Erro ao buscar roteiro');
                }

                const data = await res.json();
                exibirRoteiro(data);

            } catch (error) {
                resultado.innerHTML = `
                    <div class="card erro">
                        <h2>Ops, algo deu errado</h2>
                        <div class="resposta-ia">${error.message}</div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        function exibirRoteiro(data) {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = `
                <div class="card">
                    <img src="${data.foto_url}" alt="${data.cidade}" onerror="this.style.display='none'">
                    <h2>${data.cidade}</h2>
                    <div class="resposta-ia">${data.resposta_completa}</div>
                </div>
            `;
            resultado.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
